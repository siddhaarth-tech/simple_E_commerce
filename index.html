<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login - MiniShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-wrapper"></div>
    <div class="container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
        <div style="background:white; padding:40px; border-radius:8px; width:100%; max-width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.1); text-align:center;">
            <h2>Login</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password " required>
                </div>
                <button type="submit" id="login-btn" style="width:100%;">Login</button>
            </form>
            <p id="auth-error" style="color:red; margin-top:15px; font-size:14px;"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
